{% extends "base.html" %}

{% block title %}Portfolio — Carl Emerson{% endblock %}

{% block extra_css %}
<style>
    .portfolio-header {
        background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
        padding: 3rem 0 2.5rem;
        color: white;
    }

    .portfolio-header h1 {
        color: white;
        margin-bottom: 0.5rem;
    }

    .portfolio-header p {
        color: rgba(255,255,255,0.8);
        font-size: 1rem;
        margin: 0;
    }

    .dashboard-wrapper iframe {
        width: 100%;
        height: calc(100vh - 70px);
        border: none;
        display: block;
    }
</style>
{% endblock %}

{% block content %}
<div class="portfolio-header">
    <div class="container">
        <h1>Quantitative Trading System</h1>
        <p>Empirical Bayes hierarchical model — live paper trading via Alpaca Markets</p>
    </div>
</div>

<div class="dashboard-wrapper">
    <iframe
        src="https://carlemerson1-ebayestrader-dashboardvisualizer-jnxjly.streamlit.app?embed=true"
        title="Trading Dashboard"
        loading="lazy">
    </iframe>
</div>
{% endblock %}
